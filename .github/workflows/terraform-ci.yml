name: Terraform ELK DEployment
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # ===========================================================================
  # JOB-1: This job will run terraform init, format and validate commands
  # ===========================================================================
  terraform-init-format-validate:
    name: Init, Format & Validate
    runs-on: ubuntu-latest
    steps:
      # Downloads the entire git repo onto the GitHub runner machine
      - name: Checkout code
        uses: actions/checkout@v3
        
      # Installs the terraform CLI on the runner
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      
      # Exports AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
      # as environment variables so terraform can authenticate with AWS.
      # The actual values are stored in GitHub → Settings → Secrets.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -write=true

      - name: Terraform Validate
        run: terraform validate
  

  # ============================================================
  # JOB 2 — Plan: show what Terraform WOULD do
  # ============================================================
  terraform-plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: terraform-init-format-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform plan
        run: terraform plan -out=tfplan
      - name: upload plan file
        uses: actions/upload-artifact@v4

        # Saves the tfplan binary to GitHub's artifact storage
        # so the apply job can download and use it
        with:
          name: tfplan
          path: ./tfplan
  
  # ============================================================
  # JOB 3 — Apply: actually create/update infrastructure
  # Only runs on direct push to main (not on pull requests)
  # ============================================================
  terraform-apply:
    name: terraform apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3  
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Terraform Init
        run: terraform init
      - name: download plan file
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .
      - name: Terraform apply
        run: terraform apply --auto-approve tfplan

  # ===================================================================
  # JOB 4 — Destroy: only for testing, not used in production
  # ===================================================================
  terraform-destroy:
    name: terraform destroy
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3  
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Terraform Init
        run: terraform init
      - name: Terraform destroy
        run: terraform destroy -auto-approve
     